<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNAKE ARENA</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
    <link rel="stylesheet" href="/index.css">
</head>
<body>
    <header>
        <h1>SNAKE <span class="accent">ARENA</span></h1>
        <div class="header-right">
            <span id="game-timer" class="timer">00:00</span>
            <button id="theme-toggle" class="btn btn-small" title="Toggle day/night mode">NIGHT</button>
            <div id="connection-status" class="status-disconnected">DISCONNECTED</div>
        </div>
    </header>

    <main>
        <aside id="sidebar">
            <section id="game-list-section">
                <h2>GAMES</h2>
                <ul id="game-list"></ul>
                <button id="create-game-btn" class="btn btn-accent">+ NEW GAME</button>
            </section>

            <section id="scoreboard-section">
                <h2>SCOREBOARD</h2>
                <div id="scoreboard-tick" class="tick-display">TICK: --</div>
                <div id="global-effects" class="global-effects"></div>
                <ul id="scoreboard-list"></ul>
            </section>
        </aside>

        <div id="sidebar-resizer" aria-hidden="true"></div>

        <div id="game-view">
            <div id="game-view-header">
                <span id="viewing-game">Select a game...</span>
                <button id="reset-game-btn" class="btn btn-small" style="display:none" title="Reset game to initial state">RESET</button>
                <button id="delete-game-btn" class="btn btn-danger" style="display:none">DELETE</button>
            </div>
            <div id="canvas-wrap">
                <div id="no-game-msg">SELECT A GAME TO SPECTATE</div>
                <canvas id="gameCanvas"></canvas>
                <div id="zoom-indicator">1.0x</div>
                <div id="follow-indicator" class="hidden">FOLLOWING: <span id="follow-name"></span></div>
                <div id="minimap-wrap">
                    <canvas id="minimap"></canvas>
                    <div id="minimap-viewport"></div>
                </div>
                <div id="winner-banner" class="winner-banner hidden">
                    <div class="trophy">&#127942;</div>
                    <div class="winner-text">WINNER</div>
                    <div id="winner-name" class="winner-name"></div>
                </div>
            </div>
        </div>
    </main>

    <!-- Create game modal -->
    <div id="modal-overlay" class="hidden">
        <div id="modal">
            <h2>CREATE GAME</h2>
            <label>
                GAME NAME
                <input type="text" id="modal-game-name" placeholder="myGame" />
            </label>
            <label>
                TEMPLATE
                <select id="modal-template">
                    <option value="custom">Custom (manual size)</option>
                </select>
            </label>
            <div id="modal-size-fields">
                <label>
                    GRID WIDTH
                    <input type="number" id="modal-width" value="10" min="5" max="100" />
                </label>
                <label>
                    GRID HEIGHT
                    <input type="number" id="modal-height" value="10" min="5" max="100" />
                </label>
            </div>
            <div class="modal-actions">
                <button id="modal-cancel" class="btn">CANCEL</button>
                <button id="modal-create" class="btn btn-accent">CREATE</button>
            </div>
        </div>
    </div>

    <script src="/index.js"></script>
</body>
</html>
